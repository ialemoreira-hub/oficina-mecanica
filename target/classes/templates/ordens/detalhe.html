<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/></head>
<body>
<div th:replace="fragments/layout :: layout('Detalhe OS', ~{::conteudo})">
<div th:fragment="conteudo">

    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/ordens}" class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
        <div>
            <h4 class="fw-bold mb-0" th:text="${ordem.numeroOs}"></h4>
            <span class="badge"
                  th:classappend="'badge-' + ${ordem.status.name()}"
                  th:text="${ordem.status.descricao}"></span>
        </div>
    </div>

    <div class="row g-4">
        <!-- Informações da OS -->
        <div class="col-md-5">
            <div class="card mb-3">
                <div class="card-header fw-semibold">Informações</div>
                <div class="card-body">
                    <p><strong>Veículo:</strong> <span th:text="${ordem.veiculo.descricaoCompleta}"></span></p>
                    <p><strong>Placa:</strong> <span th:text="${ordem.veiculo.placa}"></span></p>
                    <p><strong>Cliente:</strong> <span th:text="${ordem.veiculo.cliente.nome}"></span></p>
                    <p><strong>Mecânico:</strong> <span th:text="${ordem.mecanico != null ? ordem.mecanico.nome : 'Não definido'}"></span></p>
                    <p><strong>Abertura:</strong> <span th:text="${#temporals.format(ordem.dataAbertura, 'dd/MM/yyyy HH:mm')}"></span></p>
                    <p><strong>Problema:</strong> <span th:text="${ordem.descricaoProblema}"></span></p>
                </div>
            </div>

            <!-- Alterar Status -->
            <div class="card mb-3">
                <div class="card-header fw-semibold">Atualizar Status</div>
                <div class="card-body">
                    <form th:action="@{/ordens/{id}/status(id=${ordem.id})}" method="post" class="d-flex gap-2">
                        <select name="status" class="form-select">
                            <option th:each="s : ${todosStatus}"
                                    th:value="${s.name()}"
                                    th:text="${s.descricao}"
                                    th:selected="${s == ordem.status}"></option>
                        </select>
                        <button type="submit" class="btn btn-warning">Salvar</button>
                    </form>
                </div>
            </div>

            <!-- Pagamento -->
            <div class="card" th:if="${ordem.status.name() == 'CONCLUIDA'}">
                <div class="card-header fw-semibold text-success">Registrar Pagamento</div>
                <div class="card-body">
                    <p class="fw-bold">Total: R$ <span th:text="${#numbers.formatDecimal(ordem.valorTotal, 1, 'COMMA', 2, 'POINT')}"></span></p>
                    <form th:action="@{/ordens/{id}/pagamento(id=${ordem.id})}" method="post">
                        <div class="mb-2">
                            <select name="formaPagamento" class="form-select" required>
                                <option value="DINHEIRO">Dinheiro</option>
                                <option value="PIX">Pix</option>
                                <option value="CARTAO_CREDITO">Cartão de Crédito</option>
                                <option value="CARTAO_DEBITO">Cartão de Débito</option>
                                <option value="TRANSFERENCIA">Transferência</option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <input type="text" name="observacoes" class="form-control" placeholder="Observações..."/>
                        </div>
                        <button type="submit" class="btn btn-success w-100">
                            <i class="bi bi-cash-coin me-1"></i>Confirmar Pagamento
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Itens da OS -->
        <div class="col-md-7">
            <div class="card mb-3">
                <div class="card-header fw-semibold d-flex justify-content-between">
                    <span>Peças e Serviços</span>
                    <strong>Total: R$ <span th:text="${#numbers.formatDecimal(ordem.valorTotal, 1, 'COMMA', 2, 'POINT')}"></span></strong>
                </div>
                <div class="card-body p-0">
                    <table class="table mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Descrição</th>
                                <th>Tipo</th>
                                <th>Qtd</th>
                                <th>Unit.</th>
                                <th>Subtotal</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${ordem.itens}">
                                <td th:text="${item.descricao}"></td>
                                <td>
                                    <span th:text="${item.tipo.descricao}"
                                          th:class="${item.tipo.name() == 'PECA' ? 'badge bg-info' : 'badge bg-secondary'}"></span>
                                </td>
                                <td th:text="${item.quantidade}"></td>
                                <td th:text="${'R$ ' + #numbers.formatDecimal(item.valorUnitario, 1, 'COMMA', 2, 'POINT')}"></td>
                                <td th:text="${'R$ ' + #numbers.formatDecimal(item.subtotal, 1, 'COMMA', 2, 'POINT')}"></td>
                                <td>
                                    <a th:href="@{/ordens/{id}/itens/{iid}/remover(id=${ordem.id},iid=${item.id})}"
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('Remover item?')">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(ordem.itens)}">
                                <td colspan="6" class="text-center text-muted py-3">Nenhum item adicionado</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Adicionar Item -->
            <div class="card" th:if="${ordem.status.name() != 'ENTREGUE' and ordem.status.name() != 'CANCELADA'}">
                <div class="card-header fw-semibold">Adicionar Item</div>
                <div class="card-body">
                    <form th:action="@{/ordens/{id}/itens(id=${ordem.id})}" method="post">
                        <div class="row g-2">
                            <div class="col-md-5">
                                <input type="text" name="descricao" class="form-control" placeholder="Descrição" required/>
                            </div>
                            <div class="col-md-2">
                                <select name="tipo" class="form-select" required>
                                    <option th:each="t : ${tiposItem}" th:value="${t.name()}" th:text="${t.descricao}"></option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <input type="number" name="quantidade" class="form-control" placeholder="Qtd" min="1" value="1" required/>
                            </div>
                            <div class="col-md-3">
                                <div class="input-group">
                                    <span class="input-group-text">R$</span>
                                    <input type="number" name="valorUnitario" class="form-control" placeholder="0,00"
                                           step="0.01" min="0" required/>
                                </div>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-danger mt-2">
                            <i class="bi bi-plus-lg me-1"></i>Adicionar
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
</div>
</body>
</html>
