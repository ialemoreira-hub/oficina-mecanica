<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/></head>
<body>
<div th:replace="fragments/layout :: layout('Nova OS', ~{::conteudo})">
<div th:fragment="conteudo">

    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/ordens}" class="btn btn-outline-secondary me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h4 class="fw-bold mb-0">Abrir Nova Ordem de Serviço</h4>
    </div>

    <div class="card" style="max-width:600px">
        <div class="card-body">
            <form th:action="@{/ordens/salvar}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Veículo *</label>
                    <select name="veiculoId" class="form-select" required>
                        <option value="">Selecione o veículo...</option>
                        <option th:each="v : ${veiculos}"
                                th:value="${v.id}"
                                th:text="${v.descricaoCompleta + ' - ' + v.cliente.nome}"></option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Mecânico Responsável</label>
                    <select name="mecanicoId" class="form-select">
                        <option value="">A definir...</option>
                        <option th:each="m : ${mecanicos}"
                                th:value="${m.id}"
                                th:text="${m.nome + (m.especialidade != null ? ' - ' + m.especialidade : '')}"></option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Descrição do Problema *</label>
                    <textarea name="descricaoProblema" class="form-control" rows="4"
                              placeholder="Descreva o problema relatado pelo cliente..." required></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger px-4">
                        <i class="bi bi-check-lg me-1"></i>Abrir OS
                    </button>
                    <a th:href="@{/ordens}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

</div>
</div>
</body>
</html>
