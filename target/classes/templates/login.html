<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Login | Oficina Mecânica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; border-radius: 16px; overflow: hidden; }
        .login-header { background: linear-gradient(135deg, #e74c3c, #c0392b); padding: 30px; text-align: center; color: white; }
    </style>
</head>
<body>
<div class="login-card card shadow-lg">
    <div class="login-header">
        <i class="bi bi-wrench-adjustable" style="font-size:2.5rem"></i>
        <h4 class="mt-2 mb-0">Oficina Mecânica</h4>
        <small>Sistema de Gestão</small>
    </div>
    <div class="card-body p-4">
        <div th:if="${param.erro}" class="alert alert-danger">
            E-mail ou senha incorretos.
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            Você saiu do sistema.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">E-mail</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="username" class="form-control" placeholder="seu@email.com" required/>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Senha</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
                </div>
            </div>
            <button type="submit" class="btn btn-danger w-100 py-2 fw-semibold">
                <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
            </button>
        </form>

        <div class="text-center mt-3 text-muted small">
            <i class="bi bi-info-circle me-1"></i>
            Login padrão: admin@oficina.com / admin123
        </div>
    </div>
</div>
</body>
</html>
