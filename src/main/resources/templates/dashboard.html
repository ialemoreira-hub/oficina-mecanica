<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"/></head>
<body>
<div th:replace="fragments/layout :: layout('Dashboard', ~{::conteudo})">
<div th:fragment="conteudo">

    <h4 class="mb-4 fw-bold"><i class="bi bi-speedometer2 me-2 text-danger"></i>Dashboard</h4>

    <!-- Cards de resumo -->
    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="card text-white" style="background:#e74c3c">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="fs-2 fw-bold" th:text="${totalOs}">0</div>
                            <div>Total de OS</div>
                        </div>
                        <i class="bi bi-clipboard-check fs-1 opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-warning">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="fs-2 fw-bold" th:text="${osAbertas}">0</div>
                            <div>OS Abertas</div>
                        </div>
                        <i class="bi bi-clock fs-1 opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white" style="background:#2ecc71">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="fs-2 fw-bold" th:text="${totalClientes}">0</div>
                            <div>Clientes</div>
                        </div>
                        <i class="bi bi-people fs-1 opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white" style="background:#3498db">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="fs-2 fw-bold" th:text="${totalVeiculos}">0</div>
                            <div>Veículos</div>
                        </div>
                        <i class="bi bi-car-front fs-1 opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Últimas OS -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <strong>Últimas Ordens de Serviço</strong>
            <a th:href="@{/ordens/nova}" class="btn btn-sm btn-danger">
                <i class="bi bi-plus-lg me-1"></i>Nova OS
            </a>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Número</th>
                        <th>Veículo</th>
                        <th>Cliente</th>
                        <th>Status</th>
                        <th>Valor</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="os : ${ultimasOs}">
                        <td th:text="${os.numeroOs}"></td>
                        <td th:text="${os.veiculo.descricaoCompleta}"></td>
                        <td th:text="${os.veiculo.cliente.nome}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="'badge-' + ${os.status.name()}"
                                  th:text="${os.status.descricao}"></span>
                        </td>
                        <td th:text="${'R$ ' + #numbers.formatDecimal(os.valorTotal, 1, 'COMMA', 2, 'POINT')}"></td>
                        <td>
                            <a th:href="@{/ordens/{id}(id=${os.id})}" class="btn btn-sm btn-outline-secondary">
                                <i class="bi bi-eye"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(ultimasOs)}">
                        <td colspan="6" class="text-center text-muted py-4">Nenhuma OS encontrada</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</div>
</body>
</html>
