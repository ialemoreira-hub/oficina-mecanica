<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/></head>
<body>
<div th:replace="fragments/layout :: layout('Faturamento', ~{::conteudo})">
<div th:fragment="conteudo">

    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/relatorios}" class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
        <h4 class="fw-bold mb-0">Relatório de Faturamento</h4>
    </div>

    <div class="card mb-4" style="max-width:500px">
        <div class="card-body">
            <form th:action="@{/relatorios/faturamento}" method="get" class="row g-3">
                <div class="col-md-5">
                    <label class="form-label">Data Início</label>
                    <input type="date" name="inicio" class="form-control"
                           th:value="${#temporals.format(inicio, 'yyyy-MM-dd')}"/>
                </div>
                <div class="col-md-5">
                    <label class="form-label">Data Fim</label>
                    <input type="date" name="fim" class="form-control"
                           th:value="${#temporals.format(fim, 'yyyy-MM-dd')}"/>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-danger w-100">Filtrar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Total -->
    <div class="alert alert-success fs-5">
        <i class="bi bi-cash-coin me-2"></i>
        <strong>Total Faturado:</strong>
        R$ <span th:text="${#numbers.formatDecimal(total, 1, 'COMMA', 2, 'POINT')}">0,00</span>
    </div>

    <!-- Lista -->
    <div class="card">
        <div class="card-header fw-semibold">OS no período</div>
        <div class="card-body p-0">
            <table class="table mb-0">
                <thead class="table-light">
                    <tr><th>OS</th><th>Veículo</th><th>Cliente</th><th>Status</th><th>Valor</th></tr>
                </thead>
                <tbody>
                    <tr th:each="os : ${ordens}">
                        <td th:text="${os.numeroOs}"></td>
                        <td th:text="${os.veiculo.descricaoCompleta}"></td>
                        <td th:text="${os.veiculo.cliente.nome}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="'badge-' + ${os.status.name()}"
                                  th:text="${os.status.descricao}"></span>
                        </td>
                        <td th:text="${'R$ ' + #numbers.formatDecimal(os.valorTotal, 1, 'COMMA', 2, 'POINT')}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(ordens)}">
                        <td colspan="5" class="text-center text-muted py-4">Nenhuma OS no período</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</div>
</body>
</html>
