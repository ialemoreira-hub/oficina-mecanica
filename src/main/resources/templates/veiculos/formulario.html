<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/></head>
<body>
<div th:replace="fragments/layout :: layout('Veículo', ~{::conteudo})">
<div th:fragment="conteudo">

    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/veiculos}" class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
        <h4 class="fw-bold mb-0"
            th:text="${veiculo.id == null ? 'Novo Veículo' : 'Editar Veículo'}"></h4>
    </div>

    <div class="card" style="max-width:600px">
        <div class="card-body">
            <form th:action="@{/veiculos/salvar}" th:object="${veiculo}" method="post">
                <input type="hidden" th:field="*{id}"/>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Cliente *</label>
                    <select name="clienteId" class="form-select" required>
                        <option value="">Selecione o cliente...</option>
                        <option th:each="c : ${clientes}"
                                th:value="${c.id}"
                                th:text="${c.nome + ' - ' + c.cpfCnpj}"
                                th:selected="${veiculo.cliente != null and veiculo.cliente.id == c.id}"></option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Placa *</label>
                    <input type="text" th:field="*{placa}" class="form-control text-uppercase" required
                           placeholder="ABC-1234"/>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Marca *</label>
                        <input type="text" th:field="*{marca}" class="form-control" required/>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Modelo *</label>
                        <input type="text" th:field="*{modelo}" class="form-control" required/>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-semibold">Ano *</label>
                        <input type="number" th:field="*{ano}" class="form-control" required min="1900" max="2030"/>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-semibold">Cor</label>
                        <input type="text" th:field="*{cor}" class="form-control"/>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-semibold">KM</label>
                        <input type="text" th:field="*{quilometragem}" class="form-control"/>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-2">
                    <button type="submit" class="btn btn-danger px-4">
                        <i class="bi bi-check-lg me-1"></i>Salvar
                    </button>
                    <a th:href="@{/veiculos}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

</div>
</div>
</body>
</html>
