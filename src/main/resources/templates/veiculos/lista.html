<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/></head>
<body>
<div th:replace="fragments/layout :: layout('Veículos', ~{::conteudo})">
<div th:fragment="conteudo">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="bi bi-car-front me-2 text-danger"></i>Veículos</h4>
        <a th:href="@{/veiculos/novo}" class="btn btn-danger">
            <i class="bi bi-plus-lg me-1"></i>Novo Veículo
        </a>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Placa</th>
                        <th>Veículo</th>
                        <th>Ano</th>
                        <th>Cor</th>
                        <th>Cliente</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="v : ${veiculos}">
                        <td><strong th:text="${v.placa}"></strong></td>
                        <td th:text="${v.marca + ' ' + v.modelo}"></td>
                        <td th:text="${v.ano}"></td>
                        <td th:text="${v.cor}"></td>
                        <td th:text="${v.cliente.nome}"></td>
                        <td>
                            <a th:href="@{/veiculos/editar/{id}(id=${v.id})}" class="btn btn-sm btn-outline-warning me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/veiculos/excluir/{id}(id=${v.id})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Confirmar exclusão?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(veiculos)}">
                        <td colspan="6" class="text-center text-muted py-4">Nenhum veículo cadastrado</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</div>
</body>
</html>
