<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- HEAD fragment -->
<th:block th:fragment="head">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background-color: #f5f5f5; }
        .sidebar { min-height: 100vh; background: #1a1a2e; }
        .sidebar .nav-link { color: #adb5bd; padding: 10px 20px; border-radius: 6px; margin: 2px 10px; }
        .sidebar .nav-link:hover { color: #fff; background: rgba(255,255,255,0.1); }
        .sidebar .brand { color: #fff; font-size: 1.1rem; font-weight: 700; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .main-content { padding: 30px; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 10px; }
        .badge-ABERTA { background-color: #0d6efd !important; }
        .badge-EM_ANDAMENTO { background-color: #fd7e14 !important; }
        .badge-AGUARDANDO_PECA { background-color: #6f42c1 !important; }
        .badge-CONCLUIDA { background-color: #198754 !important; }
        .badge-ENTREGUE { background-color: #20c997 !important; }
        .badge-CANCELADA { background-color: #dc3545 !important; }
    </style>
</th:block>

<!-- LAYOUT fragment -->
<th:block th:fragment="layout(titulo, conteudo)">
<div class="container-fluid">
    <div class="row">
        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar py-3 px-0">
            <div class="brand"><i class="bi bi-wrench-adjustable-circle me-2"></i>Oficina</div>
            <nav class="nav flex-column mt-3">
                <a class="nav-link" th:href="@{/dashboard}">
                    <i class="bi bi-speedometer2 me-2"></i>Dashboard
                </a>
                <a class="nav-link" th:href="@{/clientes}">
                    <i class="bi bi-people me-2"></i>Clientes
                </a>
                <a class="nav-link" th:href="@{/veiculos}">
                    <i class="bi bi-car-front me-2"></i>Veículos
                </a>
                <a class="nav-link" th:href="@{/ordens}">
                    <i class="bi bi-clipboard-check me-2"></i>Ordens de Serviço
                </a>
                <div style="border-top:1px solid rgba(255,255,255,0.15); margin: 10px 20px;"></div>
                <a class="nav-link" th:href="@{/relatorios}" sec:authorize="hasAnyRole('ADMIN','ATENDENTE')">
                    <i class="bi bi-bar-chart-line me-2"></i>Relatórios
                </a>
                <a class="nav-link" th:href="@{/usuarios}" sec:authorize="hasRole('ADMIN')">
                    <i class="bi bi-person-gear me-2"></i>Usuários
                </a>
                <div style="border-top:1px solid rgba(255,255,255,0.15); margin: 10px 20px;"></div>
                <form th:action="@{/logout}" method="post" style="margin: 0 10px;">
                    <button type="submit" class="nav-link btn btn-link text-start w-100" style="text-decoration:none;">
                        <i class="bi bi-box-arrow-right me-2"></i>Sair
                    </button>
                </form>
            </nav>
        </div>

        <!-- CONTEÚDO PRINCIPAL -->
        <div class="col-md-10 main-content">
            <!-- Alertas globais -->
            <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle me-2"></i><span th:text="${sucesso}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${erro}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Conteúdo da página -->
            <th:block th:replace="${conteudo}"/>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</th:block>

</html>
