<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/></head>
<body>
<div th:replace="fragments/layout :: layout('Clientes', ~{::conteudo})">
    <div th:fragment="conteudo">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0"><i class="bi bi-people me-2 text-danger"></i>Clientes</h4>
            <a th:href="@{/clientes/novo}" class="btn btn-danger">
                <i class="bi bi-plus-lg me-1"></i>Novo Cliente
            </a>
        </div>

        <form th:action="@{/clientes}" method="get" class="mb-3">
            <div class="input-group" style="max-width:400px">
                <input type="text" name="busca" class="form-control" placeholder="Buscar por nome..."
                       th:value="${busca}"/>
                <button class="btn btn-outline-secondary" type="submit"><i class="bi bi-search"></i></button>
            </div>
        </form>

        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Nome</th>
                        <th>CPF/CNPJ</th>
                        <th>Telefone</th>
                        <th>E-mail</th>
                        <th>Ações</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c : ${clientes}">
                        <td th:text="${c.id}"></td>
                        <td th:text="${c.nome}"></td>
                        <td th:text="${c.cpfCnpj}"></td>
                        <td th:text="${c.telefone}"></td>
                        <td th:text="${c.email}"></td>
                        <td>
                            <a th:href="@{/clientes/{id}(id=${c.id})}" class="btn btn-sm btn-outline-primary me-1">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a th:href="@{/clientes/editar/{id}(id=${c.id})}" class="btn btn-sm btn-outline-warning me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/clientes/excluir/{id}(id=${c.id})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Confirmar exclusão?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(clientes)}">
                        <td colspan="6" class="text-center text-muted py-4">Nenhum cliente cadastrado</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>
</body>
</html>
